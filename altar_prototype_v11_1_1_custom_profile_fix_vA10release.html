<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デジタル仏壇アプリ vA11 完全版</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#000;
  color:#fff;
}

.container{
  padding:16px;
}

.tabs{
  display:flex;
  gap:8px;
  margin:10px 0;
}

.tab{
  padding:8px 12px;
  border:1px solid #555;
  border-radius:20px;
  cursor:pointer;
}

.tab.active{
  background:#d4af37;
  color:#000;
}

.panel{
  display:none;
  margin-top:10px;
}

.panel.active{
  display:block;
}

.button{
  padding:10px;
  background:#d4af37;
  color:#000;
  border:none;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>デジタル仏壇アプリ・プロトタイプ</h2>

<div id="profileArea">
  <button onclick="addPerson()">＋追加</button>
  <div id="people"></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="tab1">① 遺影・位牌</div>
  <div class="tab" data-tab="tab2">② 仏壇</div>
  <div class="tab" data-tab="tab3">③ メモリアル</div>
  <div class="tab" data-tab="tab4">④ 音声</div>
  <div class="tab" data-tab="tab5">⑤ 終活メモ</div>
</div>

<div class="panel active" id="tab1">
  遺影・位牌の画面
</div>

<div class="panel" id="tab2">
  仏壇の画面
</div>

<div class="panel" id="tab3">
  メモリアル（思い出）
</div>

<div class="panel" id="tab4">
  音声（将来）
</div>

<div class="panel" id="tab5">
  終活メモ
</div>

</div>

<script>

// タブ切り替え（完全動作版）
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",()=>{

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    const target = tab.getAttribute("data-tab");

    document.querySelectorAll(".panel").forEach(p=>{
      p.classList.remove("active");
      if(p.id === target){
        p.classList.add("active");
      }
    });

  });
});

// 人物追加
function addPerson(){
  const name = prompt("名前を入力してください");
  if(!name) return;

  const div = document.createElement("div");
  div.textContent = name;
  div.style.marginTop="5px";

  document.getElementById("people").appendChild(div);
}

</script>

</body>
</html>
